repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        types_or:
          - python
          - pyi
        args:
          - --fix
          - --config=pyproject.toml
      - id: ruff-format
        types_or:
          - python
          - pyi
        args:
          - --config=pyproject.toml
